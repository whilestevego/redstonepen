name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :common:test

      - name: Run build
        run: ./gradlew build

      # GameTest steps restored in Phase 5/6 once sources exist in the modules.
      # Running runGameTestServer with empty modules boots a full Minecraft
      # server with nothing registered and hangs indefinitely.
