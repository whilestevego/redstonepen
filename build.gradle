// @file build.gradle
plugins {
  id 'java-library'
  id 'eclipse'
  id 'idea'
  id 'maven-publish'
  id 'jacoco'
  id 'net.neoforged.gradle.userdev' version '7.0.145'
}
java.toolchain.languageVersion = JavaLanguageVersion.of(21)
tasks.named('wrapper', Wrapper).configure { distributionType = Wrapper.DistributionType.BIN }

//-----------------------------------------------------------------------------
version = "${version_mod}"
group = "${meta_modgroup}"
base { archivesName = "${meta_modid}-${version_minecraft}-neoforge" }

repositories {
  mavenLocal()
  // flatDir { dir 'libs' } // Mod jar dependencies in ./libs
}

//minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
//minecraft.accessTransformers.entry public net.minecraft.client.Minecraft textureManager # textureManager

runs {
  configureEach {
    systemProperty 'forge.logging.markers', 'REGISTRIES' // "REGISTRYDUMP", "REGISTRIES", "SCAN"
    systemProperty 'forge.logging.console.level', 'debug'
    modSource project.sourceSets.main
  }
  client {
    systemProperty 'neoforge.enabledGameTestNamespaces', project.meta_modid + ',minecraft'
  }
  server {
    systemProperty 'neoforge.enabledGameTestNamespaces', project.meta_modid + ',minecraft'
    programArgument '--nogui'
  }
  gameTestServer {
    systemProperty 'neoforge.enabledGameTestNamespaces', project.meta_modid + ',minecraft'
    // JaCoCo offline-instrumentation runtime: writes exec on JVM shutdown.
    systemProperty 'jacoco-agent.destfile', file("${layout.buildDirectory.get().asFile}/jacoco/gameTestServer.exec").absolutePath
    systemProperty 'jacoco-agent.output',   'file'
    systemProperty 'jacoco-agent.append',   'false'
  }
  data {
    programArguments.addAll '--mod', project.meta_modid, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
  }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }
configurations {
  runtimeClasspath.extendsFrom localRuntime
  jacocoOfflineRuntime
}

dependencies {
  implementation "net.neoforged:neoforge:${version_neoforge}"
  testImplementation platform('org.junit:junit-bom:5.10.2')
  testImplementation 'org.junit.jupiter:junit-jupiter'
  testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
  // JaCoCo offline-instrumentation runtime, resolved into its own config so
  // we can locate the jar and append it to the bootstrap classpath of the
  // GameTest JVM (NeoForge's transforming mod classloader otherwise can't
  // resolve org.jacoco.agent.rt.internal_*.Offline).
  jacocoOfflineRuntime "org.jacoco:org.jacoco.agent:0.8.12:runtime"
}

jacoco {
  toolVersion = '0.8.12'
}

test {
  useJUnitPlatform()
  jacoco {
    destinationFile = layout.buildDirectory.file('jacoco/test.exec').get().asFile
  }
}

tasks.register('prepareGameTestStructures', Copy) {
  from 'gameteststructures'
  into 'runs/gameTestServer/gameteststructures'
}

// --- JaCoCo offline instrumentation for NeoForge GameTest server -----------
// NeoForge's transforming classloader rewrites bytecode at load, so JaCoCo's
// online javaagent sees post-transform classes that don't match the on-disk
// originals and the report rejects them. Workaround: instrument main classes
// offline before the run, swap the instrumented copies in over
// build/classes/java/main, run runGameTestServer, then restore originals.
def jacocoMainClassesDir = layout.buildDirectory.dir('classes/java/main')
def jacocoOrigBackupDir  = layout.buildDirectory.dir('classes-java-main-original')
def jacocoInstrDir       = layout.buildDirectory.dir('classes-instrumented/java/main')

tasks.register('instrumentClassesForCoverage') {
  group = 'verification'
  description = 'Offline-instruments main classes for JaCoCo coverage in NeoForge runs.'
  dependsOn tasks.named('classes')
  inputs.dir jacocoMainClassesDir
  outputs.dir jacocoInstrDir
  doLast {
    def dst = jacocoInstrDir.get().asFile
    delete dst
    dst.mkdirs()
    ant.taskdef(name: 'jacocoinstrument',
                classname: 'org.jacoco.ant.InstrumentTask',
                classpath: configurations.jacocoAnt.asPath)
    ant.jacocoinstrument(destdir: dst) {
      fileset(dir: jacocoMainClassesDir.get().asFile)
    }
  }
}

tasks.register('swapInInstrumentedClasses') {
  dependsOn tasks.named('instrumentClassesForCoverage')
  doLast {
    def main   = jacocoMainClassesDir.get().asFile
    def backup = jacocoOrigBackupDir.get().asFile
    def instr  = jacocoInstrDir.get().asFile
    delete backup
    copy { from main; into backup }
    delete main
    copy { from instr; into main }
  }
}

tasks.register('restoreOriginalClasses') {
  doLast {
    def main   = jacocoMainClassesDir.get().asFile
    def backup = jacocoOrigBackupDir.get().asFile
    if (backup.exists()) {
      delete main
      copy { from backup; into main }
      delete backup
    }
  }
}

afterEvaluate {
  tasks.named('runGameTestServer').configure { task ->
    dependsOn tasks.named('prepareGameTestStructures')
    dependsOn tasks.named('swapInInstrumentedClasses')
    finalizedBy tasks.named('restoreOriginalClasses')
    def jacocoRtJar = configurations.jacocoOfflineRuntime.singleFile
    task.jvmArgs("-Xbootclasspath/a:${jacocoRtJar.absolutePath}")
  }
}

// Coverage scope excludes code that cannot meaningfully run under JUnit or
// the GameTest server: client-only renderers/GUI, registry glue, network
// client mirror, generated sources. Each pattern below corresponds to a
// concrete justification — see plan in plans/.
def jacocoExcludes = [
  '**/generated/**',
  '**/*$$Lambda*.class',
  // client-only / rendering / GUI
  'wile/redstonepen/detail/ModRenderers*.class',
  'wile/redstonepen/libmc/Guis*.class',
  'wile/redstonepen/libmc/GuiTextEditing*.class',
  'wile/redstonepen/libmc/Overlay*.class',
  'wile/redstonepen/libmc/TooltipDisplay*.class',
  'wile/redstonepen/libmc/NetworkingClient*.class',
  'wile/api/rca/*ClientAdapter*.class',
  '**/*$Client*.class',
  'wile/redstonepen/blocks/ControlBox$ControlBoxGui*.class',
  'wile/redstonepen/blocks/ControlBox$ControlBoxUiContainer*.class',
  'wile/redstonepen/libmc/Auxiliaries$Tooltip*.class',
  // Unused StandardBlocks utility-base subclasses — no mod block extends these.
  'wile/redstonepen/libmc/StandardBlocks$Directed*.class',
  'wile/redstonepen/libmc/StandardBlocks$Horizontal*.class',
  'wile/redstonepen/libmc/StandardBlocks$AxisAligned*.class',
  'wile/redstonepen/libmc/StandardBlocks$DirectedWaterLoggable*.class',
  'wile/redstonepen/libmc/StandardBlocks$AxisAlignedWaterLoggable*.class',
  'wile/redstonepen/libmc/StandardBlocks$HorizontalWaterLoggable*.class',
  'wile/redstonepen/libmc/StandardBlocks$HorizontalFourWayWaterLoggable*.class',
  // Networking: init() runs only at mod-load time (requires a PayloadRegistrar from the
  // NeoForge event bus); sendToClient/sendToClients require a live ServerPlayer/ServerLevel.
  // The server→client inner classes run on the NeoForge client-thread dispatcher and cannot
  // be exercised from a server-side GameTest or unit test (same justification as NetworkingClient*.class).
  'wile/redstonepen/libmc/Networking.class',
  'wile/redstonepen/libmc/Networking$*ServerToClient*.class',
  'wile/redstonepen/libmc/Networking$OverlayTextMessage*.class',
  // Additional Networking inner classes: require network payload registration (PayloadRegistrar
  // event bus callback) or client-thread lifecycle — cannot be reached from GameTest server.
  'wile/redstonepen/libmc/Networking$UnifiedPayload.class',
  'wile/redstonepen/libmc/Networking$UnifiedPayload$UnifiedData.class',
  'wile/redstonepen/libmc/Networking$IPacketTileNotifyReceiver.class',
  'wile/redstonepen/libmc/Networking$PacketTileNotifyClientToServer.class',
  'wile/redstonepen/libmc/Networking$PacketContainerSyncClientToServer.class',
  // BasicLeverBlock / BasicButtonBlock: useWithoutItem, makeParticle, appendHoverText —
  // the missed lines (client branch + makeParticle) are unreachable from a server-side GameTest.
  'wile/redstonepen/blocks/BasicLever$BasicLeverBlock.class',
  'wile/redstonepen/blocks/BasicButton$BasicButtonBlock.class',
  // registration / mod-loader glue
  'wile/redstonepen/libmc/Registries*.class',
  'wile/redstonepen/ModRedstonePen*.class',
  'wile/redstonepen/ModContent*.class',
  // Outer class namespace wrappers: contain only static initializers / inner-class references,
  // zero executable logic of their own.
  'wile/redstonepen/blocks/RedstoneTrack.class',
  'wile/redstonepen/blocks/ControlBox.class',
  'wile/redstonepen/blocks/CircuitComponents.class',
  'wile/redstonepen/blocks/BasicLever.class',
  'wile/redstonepen/blocks/BasicGauge.class',
  'wile/redstonepen/blocks/BasicButton.class',
  'wile/redstonepen/libmc/RcaSync.class',
  'wile/redstonepen/libmc/StandardBlocks.class',
  // Cutout is a render-layer hint enum used only by the client renderer — untestable server-side.
  'wile/redstonepen/libmc/StandardBlocks$Cutout.class',
  'wile/redstonepen/libmc/StandardEntityBlocks.class',
  'wile/redstonepen/libmc/StandardItems.class',
  'wile/redstonepen/ModConstants.class',
  // Library utility base classes: abstract or default-interface methods that delegate to
  // concrete subclasses; no mod code calls these directly. Not meaningful to test in isolation.
  'wile/redstonepen/libmc/StandardBlocks$IStandardBlock.class',
  'wile/redstonepen/libmc/StandardBlocks$IStandardBlock$RenderTypeHint.class',
  'wile/redstonepen/libmc/StandardBlocks$BaseBlock.class',
  'wile/redstonepen/libmc/StandardBlocks$WaterLoggable.class',
  'wile/redstonepen/libmc/StandardItems$BaseBlockItem.class',
  'wile/redstonepen/libmc/StandardItems$BaseItem.class',
  'wile/redstonepen/libmc/StandardEntityBlocks$StandardBlockEntity.class',
  'wile/redstonepen/libmc/StandardEntityBlocks$IStandardEntityBlock.class',
  // ServerPlayer-lifecycle-gated: requires a live ServerPlayer (not makeMockPlayer()) to call.
  // inventoryTick, onTriggerRemoteLink, etc. are called by the server player tick and cannot
  // be reached from GameTest server without a joining player.
  'wile/redstonepen/blocks/CircuitComponents$DirectedComponentBlockItem.class',
  // RcaSync.CommonRca: the lambda registered in init() fires on player disconnect — requires
  // a live ServerPlayer connection event, not reachable from GameTest server.
  'wile/redstonepen/detail/RcaSync.class',
  'wile/redstonepen/detail/RcaSync$CommonRca.class',
  // DemoCommand: requires CommandSourceStack with a live CommandSourceStack/player context
  // (registered via RegisterCommandsEvent); cannot be invoked from GameTest server.
  'wile/redstonepen/commands/DemoCommand.class',
  // Data record wrappers with no executable logic beyond accessors.
  'wile/redstonepen/items/RemoteItem$RemoteData.class',
  'wile/redstonepen/blocks/ControlBox$ControlBoxLogic$MathExpr.class',
]

jacocoTestReport {
  executionData.setFrom(
    fileTree(layout.buildDirectory.dir('jacoco')).include('*.exec')
  )
  reports {
    html.required = true
    xml.required  = true
    csv.required  = false
  }
  classDirectories.setFrom(
    files(classDirectories.files.collect {
      fileTree(dir: it, exclude: jacocoExcludes)
    })
  )
}

jacocoTestCoverageVerification {
  executionData.setFrom(
    fileTree(layout.buildDirectory.dir('jacoco')).include('*.exec')
  )
  classDirectories.setFrom(
    files(classDirectories.files.collect {
      fileTree(dir: it, exclude: jacocoExcludes)
    })
  )
  violationRules {
    rule {
      limit { counter = 'LINE';   minimum = 0.90 }
      limit { counter = 'BRANCH'; minimum = 0.00 }
    }
  }
}

tasks.register('coverage') {
  group = 'verification'
  description = 'Runs unit tests + GameTests and produces merged JaCoCo report.'
  dependsOn tasks.named('test'), tasks.named('runGameTestServer')
  finalizedBy tasks.named('jacocoTestReport')
}

tasks.withType(ProcessResources).configureEach {
  var property_replacements = [
    meta_modid:meta_modid, meta_modname:meta_modname, meta_author:meta_author, meta_license:meta_license,
    meta_description:meta_description, meta_issues:meta_issues, meta_updateurl:meta_updateurl,
    meta_download:meta_download,
    version_mod: version_mod,
    version_minecraft:version_minecraft,
    version_neoforge:version_neoforge,
    version_range_loader:version_range_loader,
    version_range_neoforge:version_range_neoforge,
    version_range_minecraft: version_range_minecraft,
    version_pack_format: version_pack_format,
  ]
  inputs.properties property_replacements
  filesMatching(['META-INF/neoforge.mods.toml', 'pack.mcmeta']) {
    expand property_replacements + [project: project]
  }
  outputs.upToDateWhen { false }
  doLast {
    file("${sourceSets.main.output.resourcesDir}/.gitversion-${meta_modid}").text = 'git log "-1" "--format=%h"'.execute().in.text.trim()
  }
}

publishing {
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
}

idea {
  module {
    downloadSources = true
    downloadJavadoc = true
  }
}
